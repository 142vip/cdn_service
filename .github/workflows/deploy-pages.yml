name: Deploy GitHub Pages

on:
  push:
    branches: [main, next]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.6.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: actions/cache/restore@v4
        with:
          path: pages-site
          key: pages-${{ github.sha }}
          restore-keys: pages-

      - name: Build & merge
        env:
          VITE_BASE_PATH: ${{ github.ref_name == 'main' && '/cdn_service/' || '/cdn_service/next/' }}
        run: |
          pnpm site:build
          TARGET="pages-site/cdn_service${{ github.ref_name == 'main' && '' || '/next' }}"
          mkdir -p "$TARGET"
          rm -rf "$TARGET"/*
          cp -r site/dist/* "$TARGET/"
          [ -f pages-site/index.html ] || printf '%s\n' \
            '<!DOCTYPE html><html><head><meta charset="UTF-8">' \
            '<meta http-equiv="refresh" content="0;url=cdn_service/"></head><body></body></html>' \
            > pages-site/index.html

      - uses: actions/cache/save@v4
        with:
          path: pages-site
          key: pages-${{ github.sha }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages-site

      - uses: actions/deploy-pages@v4
        id: deployment
